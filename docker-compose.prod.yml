# =============================================================================
# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

version: '3.8'

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/crm/postgres:/var/lib/postgresql/data

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - /data/crm/redis:/data

  backend:
    restart: always
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DB_PASSWORD: ${DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
