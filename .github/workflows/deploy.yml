name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════
  # Build & Push Docker Images
  # ═══════════════════════════════════════════════
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend image
      - uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.REGISTRY }}/crm-backend:latest
            ${{ env.REGISTRY }}/crm-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend image
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/crm-frontend:latest
            ${{ env.REGISTRY }}/crm-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.PROD_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════
  # Deploy to Kubernetes
  # ═══════════════════════════════════════════════
  deploy-k8s:
    name: Deploy to K8s
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags in manifests
        run: |
          sed -i "s|\${REGISTRY}|${{ env.REGISTRY }}|g" k8s/backend.yaml k8s/frontend.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/backend.yaml k8s/frontend.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n crm --timeout=120s
          kubectl rollout status deployment/frontend -n crm --timeout=120s

      - name: Verify health
        run: |
          kubectl exec -n crm deploy/backend -- wget -qO- http://localhost:3000/api/health || true
